<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LuxArs - Versión Mejorada</title>
<style>
body{margin:0;background:#111;color:#fff;font-family:Arial,sans-serif}
header{position:fixed;top:0;left:0;right:0;padding:20px;background:#111c;backdrop-filter:blur(8px);display:flex;justify-content:center;z-index:10}
nav a{color:#fff;margin:0 18px;text-decoration:none}
section{min-height:100vh;padding:110px 8% 60px}
#hero{display:flex;align-items:center;justify-content:space-between}
canvas{width:45vw;height:70vh;display:block}
.card{background:#1d1d1d;padding:20px;border-radius:16px;margin:15px 0}
</style>
</head>
<body>
<header>
<nav>
<a href="#hero">Inicio</a>
<a href="#explorar">Explorar</a>
<a href="#artistas">Artistas</a>
<a href="#servicios">Servicios</a>
<a href="#contacto">Contacto</a>
</nav>
</header>

<section id="hero">
<div>
<h1>LuxArs</h1>
<p>Versión base mejorada. Se eliminó el botón "Crear cuenta".</p>
</div>
<canvas id="c"></canvas>
</section>

<section id="explorar"><h2>Explorar</h2><div class="card">Contenido.</div></section>
<section id="artistas"><h2>Artistas</h2><div class="card">Todos los enlaces funcionan.</div></section>
<section id="servicios"><h2>Servicios</h2><div class="card">Servicios.</div></section>
<section id="contacto"><h2>Contacto</h2><div class="card">Contacto.</div></section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r160/three.min.js"></script>
<script>
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(45,innerWidth*0.45/(innerHeight*0.7),0.1,100);
camera.position.set(0,0,6);
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById("c"),alpha:true,antialias:true});
renderer.setSize(innerWidth*0.45,innerHeight*0.7);
const geo=new THREE.IcosahedronGeometry(1.8,32);
const mat=new THREE.MeshPhysicalMaterial({color:0xd8a44a,metalness:.5,roughness:.15,clearcoat:1});
const mesh=new THREE.Mesh(geo,mat);
scene.add(mesh);
scene.add(new THREE.AmbientLight(0xffffff,.6));
const p=new THREE.PointLight(0xffffff,30);p.position.set(3,3,4);scene.add(p);
function a(t){
requestAnimationFrame(a);
t*=0.001;
mesh.rotation.y=t*.6;
mesh.rotation.x=t*.3;
camera.position.x=Math.sin(t*.3)*0.8;
camera.position.y=Math.cos(t*.25)*0.3;
camera.position.z=6+Math.sin(t*.4)*0.3;
camera.lookAt(0,0,0);
renderer.render(scene,camera);
}
a();
</script>
</body>
</html>
